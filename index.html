<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Antiyoy</title>
</head>
<body>



  <div id="app">

<div id="lobby">
  <h1>ANTIYOY</h1>
  <p>Multiplayer strateegiamäng</p>

  <div class="card">
    <h2>Ühenda serveriga</h2>
    <div class="input-row">
      <input type="text" id="server-url" placeholder="Server URL" value="https://tinkr.tech" style="flex:2"/>
    </div>
    <div class="input-row">
      <input type="text" id="db-namespace" placeholder="Namespace (nt poly)" value="Philipp_antiyoy"/>
      <input type="text" id="db-name" placeholder="DB nimi (nt antiyoy)" value="philipp_database"/>
    </div>
    <div class="input-row">
      <input type="text" id="username-input" placeholder="Sinu nimi" />
      <button class="btn-primary">Liitu</button>
    </div>
    <div id="status-msg"></div>
    <div id="error-msg"></div>
  </div>

  <div class="card">
    <h2>Lobby</h2>
    <div id="players-list" class="players-list">
      <div style="color:white">Laadimine...</div>
    </div>
    <div class="status-row" style="margin-top:12px;">
      <button class="btn-success">Alusta mängu</button>
    </div>
  </div>
</div>

</div>

  <div id="game"></div>
  <button  id="end-turn">Lõpeta oma kord</button>
  <button id="abortbtn">Anna Alla</button>
<div id="shop-panel">

  <div id="coin-counter"></div>
<div id="income-counter"></div>

  <button class="buy-btn" data-type="peasant">
    <img src="https://tinkr.tech/sdb_apps/antiyoy/images/unit_peasant.svg">
    Peasant <span class="cost">10</span>
  </button>

  <button class="buy-btn" data-type="spearman">
    <img src="https://tinkr.tech/sdb_apps/antiyoy/images/unit_spearman.svg">
    Spearman <span class="cost">20</span>
  </button>

  <button class="buy-btn" data-type="knight">
    <img src="https://tinkr.tech/sdb_apps/antiyoy/images/unit_knight.svg">
    Knight <span class="cost">30</span>
  </button>

  <button class="buy-btn" data-type="baron">
    <img src="https://tinkr.tech/sdb_apps/antiyoy/images/unit_baron.svg">
    Baron <span class="cost">40</span>
  </button>

  <button class="buy-btn" data-type="farm">
    <img src="https://tinkr.tech/sdb_apps/antiyoy/images/building_farm.svg">
    Farm <span class="cost">10</span>
  </button>

  <button class="buy-btn" data-type="tower">
    <img src="https://tinkr.tech/sdb_apps/antiyoy/images/building_tower.svg">
    Tower <span class="cost">15</span>
  </button>

  <button class="buy-btn" data-type="fortress">
    <img src="https://tinkr.tech/sdb_apps/antiyoy/images/building_fortress.svg">
    Fortress <span class="cost">35</span>
  </button>

</div>



  <div  id="turn-text"></div>
  <div  id="Your-name"></div>

</body>
<script defer src="script.js"></script>
</html>
